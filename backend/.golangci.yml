version: "2"

linters:
  default: standard
  enable:
    - errorlint
    - bodyclose
    - noctx
    - rowserrcheck
    - sqlclosecheck
    - copyloopvar
    - misspell
    - unparam
    - gocritic
    - revive
  settings:
    errcheck:
      check-blank: true
    revive:
      rules:
        - name: package-comments
          disabled: true
        - name: exported
          disabled: true

formatters:
  enable:
    - gofmt
    - goimports
